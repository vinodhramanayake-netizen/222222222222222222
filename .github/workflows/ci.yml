name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Typecheck, lint, test, static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (incl. jsx-a11y)
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build static export
        run: npm run build

      - name: Assert static export output exists
        run: test -f out/index.html
